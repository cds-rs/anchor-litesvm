name: Deploy book to Pages

# This workflow lives only on `book-pages` so it never enters the upstream PR
# (feat/buildable-ix). It builds the book from `feat/buildable-ix` (the branch
# that carries the book), so what deploys is always that branch's content.
#
# A `push` workflow only runs when the workflow file is present on the pushed
# branch, so this cannot auto-fire on a push to feat/buildable-ix (the file is
# not there). Deploy on demand instead: click "Run workflow" (workflow_dispatch)
# in the Actions tab, or push this `book-pages` branch.
on:
  workflow_dispatch:
  push:
    branches: [book-pages]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/buildable-ix
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v0.5.3/mdbook-v0.5.3-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build the book
        run: mdbook build book
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
